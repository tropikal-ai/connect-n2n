name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
  workflow_dispatch:

# A new push supersedes the in-flight run for the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the checkout.
permissions:
  contents: read

jobs:
  # The shared Connect-family quality gate (single source of CI truth).
  # TODO(after tropikal-ai/connect#4 merges): flip the pin to
  # tropikal-ai/connect/.github/workflows/php-quality.yml@<sha or tag>.
  quality:
    uses: realbotbob/connect/.github/workflows/php-quality.yml@e149bb948fbf140c9c5a1d918e452d3917001489
    with:
      extensions: json, mbstring, openssl, curl, sodium
      coverage: xdebug
      test: vendor/bin/phpunit --colors=never --coverage-text

  # Single stable check for branch protection: "CI green" fails when any
  # quality job failed, was cancelled, or was skipped.
  ci:
    name: CI green
    if: always()
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fail if any required job did not succeed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
      - run: echo "All quality jobs passed."
