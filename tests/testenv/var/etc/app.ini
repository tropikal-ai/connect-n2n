; Minimal n2n configuration for the package's integration tests. No database:
; the routed integration tests exercise the full HTTP pipeline against the
; in-memory store; ORM-backed stores are covered by their own unit tests.

[general]
page.name = "connect-n2n testenv"
application.name = "connectn2ntest"

[web]
response.browser_caching_enabled = false
response.caching_enabled = false
view.caching_enabled = false

[routing]
locales[] = "en"

[error]
strict_attitude = true
startup.detect_errors = true
log.save_detail_info = false
log.send_mail = false

[locales]
default = "en"
